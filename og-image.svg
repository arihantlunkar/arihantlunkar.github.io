<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Arihant Lunkar  Software Engineering Technical Leader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#15171c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#41d2a8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#41d2a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#129575" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#129575" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ce6c4"/>
      <stop offset="60%" stop-color="#41d2a8"/>
      <stop offset="100%" stop-color="#eceef2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g font-family="Space Grotesk, Inter, system-ui, sans-serif" fill="#eceef2">
    <text x="80" y="200" font-size="32" font-weight="500" letter-spacing="6" fill="#41d2a8">PORTFOLIO</text>
    <text x="80" y="320" font-size="92" font-weight="700" letter-spacing="-2">Arihant Lunkar</text>
    <text x="80" y="410" font-size="56" font-weight="700" letter-spacing="-1" fill="url(#title)">Software Engineering Technical Leader</text>
    <text x="80" y="490" font-size="32" font-weight="400" fill="#aab1be">10 years in Software Development.</text>
    <text x="80" y="555" font-size="26" font-weight="500" fill="#7c8493">Cisco  ·  GE HealthCare  ·  Siemens Healthineers</text>
  </g>

  <g transform="translate(960,150)">
    <circle cx="80" cy="80" r="80" fill="none" stroke="#41d2a8" stroke-width="2" opacity="0.5"/>
    <circle cx="80" cy="80" r="60" fill="#0b0c10" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="100" text-anchor="middle" font-family="Space Grotesk, Inter, sans-serif" font-size="56" font-weight="700" fill="#eceef2">A<tspan fill="#41d2a8">L</tspan></text>
  </g>
